###############################################################################
# ceerious i3 status config
# see "man i3status" for documentation.
#
# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!
###############################################################################

general {
    interval         = 1
    colors             = true
    color_good      = '#88b090'
    color_degraded  = '#ccdc90'
    color_bad       = '#e89393'
}

order += "volume master"
order += "battery 0"
order += "wireless wlp1s0"
order += "disk /"
order += "memory"
#order += "ethernet enp0s3"
order += "cpu_usage 0"
order += "tztime local"


wireless wlp1s0 {
    format_up = "󰤨  %essid (%quality)"
    format_down = "🌐 No Connection"
}

ethernet enp0s3 {
    #if you use %speed, i3status requires root privileges
    format_up = "%ip (%speed)"
    format_down = "Nothing"
}

battery 0 {
    format = "%status %percentage"
    format_down = ""
    last_full_capacity = true
    integer_battery_capacity = true
    low_threshold = 11
    threshold_type = percentage
    hide_seconds = true
    status_chr = " "
    status_bat = " "
    status_unk = " "
    status_full = " "
}

tztime local {
    format = "  %A %e, %B    %I:%M:%S %p -  virtual_lad "
    # format = " %A %e.%B   %I:%M %p"
}

cpu_usage {
    format = "  %usage"
}

disk "/" {
    format = " %avail"
    prefix_type    = custom
    low_threshold = 20
    threshold_type = percentage_avail
}

memory {
    format = "RAM: %used/%total"
#    threshold_type = percentage#
#    low_threshold = 20
    color_good = '#88b090'
    color_degraded = '#ccdc90'
    color_bad = '#e89393'
}

wireless wlp4s0 {
    format_up = "📶 %essid (%quality%%) "
    format_down = "🌐 No Connection "
}

volume master {
    format = "%volume  "
    format_muted = " "
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}
